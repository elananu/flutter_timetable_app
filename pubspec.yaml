name: timetable_app
description: AI-powered school timetable scheduler using Claude AI.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  http: ^1.2.1          # Anthropic API calls
  share_plus: ^10.0.0    # CSV / file export
  path_provider: ^2.1.4 # File system
  cupertino_icons: ^1.0.6
  pdf: ^3.11.1
  printing: ^5.14.3
  
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
